<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 VIKTANYA HOME & TRAVEL 🏠</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #1a0d00; display:flex; justify-content:center; align-items:center; min-height: 100vh; }
        .modal-content { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 500px; width: 92%; text-align: center; }
        .home-btn { display:flex; flex-direction:column; justify-content:center; align-items:center; height:170px; color:white; text-decoration:none; border-radius:30px; font-weight:900; font-size:1.8em; transition: 0.4s; border: 2px solid #d4af37; background: linear-gradient(135deg, #3d1f00, #1a0d00); }
        .home-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px #d4af37; filter: brightness(1.2); }
        .home-btn span { font-size: 0.45em; font-weight: normal; margin-top: 10px; color: #d4af37; letter-spacing: 2px; text-transform: uppercase; }
        h1 { color:#d4af37; font-size:2.5em; text-transform:uppercase; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="modal-content">
        <h1>Viktanya Home</h1>
        <!-- Открываем в новой вкладке через target="_blank" -->
        <a href="https://travel.yandex.ru" target="_blank" class="home-btn">
            🚂 ЖД БИЛЕТЫ <span>Поезда по России и СНГ</span>
        </a>
        <a href="https://realty.ya.ru" target="_blank" class="home-btn">
            🔑 НЕДВИЖИМОСТЬ <span>Аренда и покупка жилья</span>
        </a>
    </div>
</body>
</html>
