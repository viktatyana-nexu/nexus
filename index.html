<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏠 VIKTANYA HOME & TRAVEL 🏠</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #1a0d00; overflow: hidden; }
        .nav-panel { position: fixed; top: 0; width: 100%; background: #000; padding: 15px 0; text-align: center; z-index: 999; border-bottom: 2px solid #d4af37; }
        .back-btn { background: #d4af37; color: #000; padding: 12px 40px; border-radius: 10px; cursor: pointer; border: none; font-weight: bold; box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        #home-iframe { width: 100%; height: 100vh; border: none; background: #fff; margin-top: 65px; }
        #home-modal { display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(26, 13, 0, 0.95); z-index: 10000; justify-content:center; align-items:center; backdrop-filter: blur(15px); }
        .modal-content { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 500px; width: 92%; text-align: center; }
        .home-btn { display:flex; flex-direction:column; justify-content:center; align-items:center; height:170px; color:white; text-decoration:none; border-radius:30px; font-weight:900; font-size:1.8em; transition: 0.4s; border: 2px solid #d4af37; background: linear-gradient(135deg, #3d1f00, #1a0d00); }
        .home-btn:hover { transform: scale(1.03); box-shadow: 0 0 40px #d4af37; filter: brightness(1.2); }
        .home-btn span { font-size: 0.45em; font-weight: normal; margin-top: 10px; color: #d4af37; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="nav-panel"><button class="back-btn" onclick="document.getElementById('home-modal').style.display='flex'">🏠 МЕНЮ СЕРВИСОВ</button></div>
    <iframe src="http://home.viktanya.ru" id="home-iframe" name="home-iframe"></iframe>
    <div id="home-modal">
        <div class="modal-content">
            <h1 style="color:#d4af37; font-size:2.5em; text-transform:uppercase;">Viktanya Home</h1>
            <a href="http://home.viktanya.ru" target="home-iframe" onclick="document.getElementById('home-modal').style.display='none'" class="home-btn">
                🚂 ЖД БИЛЕТЫ <span>ПОЕЗДА ПО РОССИИ И СНГ</span>
            </a>
            <a href="http://home.viktanya.ru" target="home-iframe" onclick="document.getElementById('home-modal').style.display='none'" class="home-btn">
                🔑 НЕДВИЖИМОСТЬ <span>АРЕНДА И ПОКУПКА ЖИЛЬЯ</span>
            </a>
        </div>
    </div>
</body>
</html>
